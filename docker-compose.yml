services:
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    command: ["postgres", "-c", "wal_level=logical"]

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch-wolfi:9.3.2
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - 'ES_JAVA_OPTS=-Xms512m -Xmx512m'
      - xpack.security.enabled=false
    ports:
      - '9200:9200'
    volumes:
      - esdata:/usr/share/elasticsearch/data
    restart: always

  kibana:
    image: docker.elastic.co/kibana/kibana:9.3.2
    container_name: kibana
    ports:
      - '5601:5601'
    environment:
      ELASTICSEARCH_HOSTS: 'http://elasticsearch:9200'
    depends_on:
      - elasticsearch
    restart: always

  redis:
    image: redis:alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - ./redisdata:/data:Z
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 30s
      timeout: 10s
      retries: 5

  debezium-server:
    image: quay.io/debezium/server:3.0.0.Final
    container_name: debezium-server
    user: "0:0"
    restart: always
    environment:
      - DEBEZIUM_SOURCE_DATABASE_PASSWORD=${DB_PASSWORD}
      - DEBEZIUM_SINK_REDIS_PASSWORD=${REDIS_PASSWORD}
    volumes:
      - ./debezium-conf:/debezium/config:Z
      - debezium-data:/debezium/data
    depends_on:
      - postgres
      - redis

volumes:
  pgdata:
  esdata:
  redisdata:
  debezium-data:
